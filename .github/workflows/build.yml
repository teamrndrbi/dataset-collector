name: Build Desktop App
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller
      - name: Prepare client secret
        run: copy client_secret.template.json client_secret.json
      - name: Build app
        run: |
          pyinstaller --name DatasetCollector --noconfirm --clean --add-data "templates;templates" --add-data "static;static" --add-data "client_secret.template.json;." --hidden-import google.auth.transport.requests --hidden-import google_auth_oauthlib --hidden-import google_auth_oauthlib.flow --hidden-import googleapiclient.discovery --hidden-import googleapiclient._helpers --hidden-import google.oauth2.credentials --collect-all google.auth --collect-all google_auth_oauthlib --collect-all googleapiclient launcher.py
      - uses: actions/upload-artifact@v4
        with:
          name: DatasetCollector-Windows
          path: dist/DatasetCollector/
          compression-level: 9
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller
      - name: Prepare client secret
        run: cp client_secret.template.json client_secret.json
      - name: Build app
        run: |
          pyinstaller --name DatasetCollector --noconfirm --clean --add-data "templates:templates" --add-data "static:static" --add-data "client_secret.template.json:." --hidden-import google.auth.transport.requests --hidden-import google_auth_oauthlib --hidden-import google_auth_oauthlib.flow --hidden-import googleapiclient.discovery --hidden-import googleapiclient._helpers --hidden-import google.oauth2.credentials --collect-all google.auth --collect-all google_auth_oauthlib --collect-all googleapiclient launcher.py
      - uses: actions/upload-artifact@v4
        with:
          name: DatasetCollector-macOS
          path: dist/DatasetCollector/
          compression-level: 9          
